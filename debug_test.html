<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Test - Hardware E-commerce</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        h2 { margin-top: 30px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; }
        .product-card img { max-width: 100%; height: auto; border-radius: 5px; }
        .product-name { font-weight: bold; margin: 10px 0 5px; }
        .product-price { color: #e91e63; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>🔍 Debug Test - Hardware E-commerce</h1>
    
    <div id="results"></div>
    
    <h2>Products from JavaScript:</h2>
    <div id="productsContainer" class="products-container"></div>

    <!-- Load scripts exactly as index.html does -->
    <script src="./products.js"></script>
    <script src="app.js"></script>
    
    <script>
        function log(message, type) {
            const div = document.createElement('div');
            div.className = 'test-result ' + type;
            div.textContent = message;
            document.getElementById('results').appendChild(div);
            console.log('[' + type.toUpperCase() + ']', message);
        }
        
        // Run tests immediately
        function runTests() {
            log('Starting tests...', 'warning');
            
            // Test 1: Check products.js loaded
            if (typeof productsData !== 'undefined') {
                log('✅ Step 1: productsData is defined from products.js', 'success');
                log('   - Length: ' + productsData.length, 'success');
            } else {
                log('❌ Step 1: productsData is NOT defined from products.js', 'error');
            }
            
            // Test 2: Check window.productsDataStatic
            if (typeof window.productsDataStatic !== 'undefined') {
                log('✅ Step 2: window.productsDataStatic is defined', 'success');
                log('   - Length: ' + window.productsDataStatic.length, 'success');
            } else {
                log('❌ Step 2: window.productsDataStatic is NOT defined', 'error');
            }
            
            // Test 3: Check if products.js has data
            if (typeof productsData !== 'undefined' && productsData.length > 0) {
                log('✅ Step 3: productsData has ' + productsData.length + ' products', 'success');
                
                // Display products
                const container = document.getElementById('productsContainer');
                productsData.slice(0, 6).forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'product-card';
                    div.innerHTML = `
                        <img src="${p.image}" alt="${p.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22>No Image</text></svg>'">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price} Fcfa</div>
                        <div>Category: ${p.category}</div>
                    `;
                    container.appendChild(div);
                });
                
                // Test calling renderProducts
                log('Calling renderProducts()...', 'warning');
                if (typeof renderProducts === 'function') {
                    renderProducts();
                    log('✅ renderProducts() called', 'success');
                } else {
                    log('❌ renderProducts() function not found', 'error');
                }
                
                // Check if grid has content
                setTimeout(() => {
                    const actualGrid = document.getElementById('productsGrid');
                    if (actualGrid) {
                        log('Products grid innerHTML length: ' + actualGrid.innerHTML.length, 'warning');
                        if (actualGrid.innerHTML.length > 0) {
                            log('✅ Products rendered to #productsGrid!', 'success');
                        } else {
                            log('❌ Products grid is empty after renderProducts()', 'error');
                        }
                    } else {
                        log('❌ #productsGrid element not found', 'error');
                    }
                }, 500);
            } else {
                log('❌ Step 3: productsData is empty or undefined', 'error');
                
                // Try fallback
                log('Trying fallback to window.productsDataStatic...', 'warning');
                if (window.productsDataStatic && window.productsDataStatic.length > 0) {
                    productsData = window.productsDataStatic;
                    log('✅ Fallback successful: productsData set from window.productsDataStatic', 'success');
                    renderProducts();
                }
            }
        }
        
        // Run tests immediately
        runTests();
        
        // Also test the event
        window.addEventListener('productsLoaded', () => {
            log('📦 productsLoaded event fired!', 'success');
        });
    </script>
</body>
</html>
